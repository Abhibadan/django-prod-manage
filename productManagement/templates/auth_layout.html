<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auth{% endblock %} | ProductManager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/glassmorphcard.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-dark text-light">
    <!-- Flash Messages for Auth Pages -->
    {% if messages %}
    <div class="position-absolute top-0 end-0 p-3" style="z-index: 1050;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show shadow-lg border-0" style="background: rgba(30,41,59,0.9); backdrop-filter: blur(10px); color: #e2e8f0; border-left: 4px solid #6366f1 !important;" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Content for login/register cards -->
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
